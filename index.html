<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FORGE">
  <meta name="theme-color" content="#0A0A0A">
  <meta name="description" content="FORGE — Système de progression personnel. Habitudes, Focus, Sport, Rangs.">
  <title>FORGE</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

<!-- ═══════════════════════════════════════════ AUTH ══ -->
<div id="auth-screen" style="display:none">
  <div class="auth-box">
    <div class="auth-logo">
      <h1>FORGE</h1>
      <p>Deviens celui que tu veux être</p>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Connexion</button>
      <button class="auth-tab" data-tab="register">Inscription</button>
    </div>

    <!-- Login -->
    <div id="login-form">
      <div class="form-field" style="margin-bottom:14px">
        <label class="label">Identifiant ou Email</label>
        <input id="login-user" class="input" placeholder="demo">
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label class="label">Mot de passe</label>
        <input id="login-pass" class="input" type="password" placeholder="••••••••">
      </div>
      <div id="login-error" class="error-banner" style="display:none;margin-bottom:14px"></div>
      <button id="login-btn" class="btn-primary">Accéder à FORGE</button>
      <p style="text-align:center;margin-top:12px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted)">Démo : demo / demo123</p>
    </div>

    <!-- Register -->
    <div id="register-form" style="display:none">
      <div class="form-row" style="margin-bottom:14px">
        <div class="form-field">
          <label class="label">Prénom</label>
          <input id="reg-first" class="input" placeholder="Léo">
        </div>
        <div class="form-field">
          <label class="label">Nom</label>
          <input id="reg-last" class="input" placeholder="Martin">
        </div>
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label class="label">Email</label>
        <input id="reg-email" class="input" type="email" placeholder="leo@email.com">
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label class="label">Nom d'utilisateur</label>
        <input id="reg-user" class="input" placeholder="leomar">
      </div>
      <div class="form-field" style="margin-bottom:14px">
        <label class="label">Mot de passe (min. 6)</label>
        <input id="reg-pass" class="input" type="password" placeholder="••••••••">
      </div>
      <div id="register-error" class="error-banner" style="display:none;margin-bottom:14px"></div>
      <button id="register-btn" class="btn-primary">Créer mon compte</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════ APP ═══ -->
<div id="app-screen" style="display:none;width:100%;height:100vh;display:none;flex-direction:row">

  <!-- Sidebar (desktop) -->
  <nav id="sidebar">
    <div class="sidebar-logo">F</div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-nav">
      <button class="nav-btn" data-tab="dashboard"  onclick="goTo('dashboard')"     title="Dashboard">⊞</button>
      <button class="nav-btn" data-tab="habits"     onclick="goTo('habits')"        title="Habitudes">☑</button>
      <button class="nav-btn" data-tab="focus"      onclick="goTo('focus')"         title="Focus">◷</button>
      <button class="nav-btn" data-tab="sport"      onclick="goTo('sport')"         title="Sport">⚡</button>
      <button class="nav-btn" data-tab="calendar"   onclick="goTo('calendar')"      title="Calendrier">⊟</button>
      <button class="nav-btn" data-tab="scanner"    onclick="goTo('scanner')"       title="Scanner EDT">⊛</button>
      <button class="nav-btn" data-tab="pass"       onclick="goTo('pass')"          title="Forge Pass">★</button>
      <button class="nav-btn" data-tab="circle"     onclick="goTo('circle')"        title="Cercle">⊕</button>
      <button class="nav-btn" data-tab="ranks"      onclick="goTo('ranks')"         title="Rangs">♛</button>
      <div class="nav-sep"></div>
      <button class="nav-btn" data-tab="subscription" onclick="goTo('subscription')" title="Abonnement">♔</button>
    </div>
    <button id="sidebar-avatar" class="sidebar-avatar" onclick="openProfileModal()">?</button>
  </nav>

  <!-- Main content -->
  <main id="main">
    <div id="view-dashboard"    class="view"></div>
    <div id="view-habits"       class="view"></div>
    <div id="view-focus"        class="view"></div>
    <div id="view-sport"        class="view"></div>
    <div id="view-calendar"     class="view" style="padding:22px 0 0"></div>
    <div id="view-scanner"      class="view"></div>
    <div id="view-pass"         class="view"></div>
    <div id="view-circle"       class="view"></div>
    <div id="view-ranks"        class="view"></div>
    <div id="view-subscription" class="view"></div>
    <div id="view-onboarding"   class="view"></div>
  </main>

  <!-- Mobile bottom nav -->
  <nav id="mobile-nav">
    <button class="mobile-nav-btn" data-tab="dashboard"  onclick="goTo('dashboard')">⊞<span>Home</span></button>
    <button class="mobile-nav-btn" data-tab="habits"     onclick="goTo('habits')">☑<span>Habits</span></button>
    <button class="mobile-nav-btn" data-tab="focus"      onclick="goTo('focus')">◷<span>Focus</span></button>
    <button class="mobile-nav-btn" data-tab="sport"      onclick="goTo('sport')">⚡<span>Sport</span></button>
    <button class="mobile-nav-btn" data-tab="ranks"      onclick="goTo('ranks')" style="position:relative">
      ♛<span>Rangs</span>
    </button>
    <button class="mobile-nav-btn" onclick="openProfileModal()" style="font-size:14px">
      <span id="mobile-avatar" style="width:24px;height:24px;border-radius:50%;background:rgba(0,255,133,.15);border:1px solid rgba(0,255,133,.4);display:flex;align-items:center;justify-content:center;font-size:10px;font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--accent)">?</span>
      <span>Profil</span>
    </button>
  </nav>
</div>

<!-- ═══════════════════════════════════════ MODALS ════ -->

<!-- Habit modal -->
<div id="habit-modal" class="modal-overlay" onclick="if(event.target===this)closeHabitModal()">
  <div class="modal-box">
    <div id="habit-modal-body"></div>
  </div>
</div>

<!-- Profile modal -->
<div id="profile-modal" class="modal-overlay" onclick="if(event.target===this)hideModal('profile-modal')">
  <div class="modal-box">
    <div id="profile-modal-body"></div>
  </div>
</div>

<!-- Notification banner -->
<div id="notif-banner">
  <span style="font-size:16px">⚡</span>
  <span style="font-size:13px;color:#fff">Notification</span>
</div>

<script src="app.js"></script>
</body>
</html>
